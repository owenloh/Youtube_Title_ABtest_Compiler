<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youtube Title Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9ImciIHgxPSIwIiB5MT0iMCIgeDI9IjEiIHkyPSIxIj48c3RvcCBvZmZzZXQ9IjAiIHN0b3AtY29sb3I9IiM2MzY2ZjEiLz48c3RvcCBvZmZzZXQ9IjEiIHN0b3AtY29sb3I9IiM4YjVjZjYiLz48L2xpbmVhckdyYWRpZW50PjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjI2IiBmaWxsPSJ1cmwoI2cpIi8+PHBhdGggZD0iTTQxIDMxIEw0MSA2OSBMNzEgNTAgWiIgZmlsbD0iI2ZmZiIvPjwvc3ZnPgo=">
<style>
  :root{
    --bg:#f5f6f8; --surface:#ffffff; --surface-2:#fbfbfc;
    --border:#e9eaee; --border-strong:#dfe1e6;
    --ink:#1b1d24; --muted:#6b7077; --faint:#9aa0a8;
    --accent:#6366f1; --accent-soft:#eef0fe;
    --green:#16a34a; --green-bg:#e7f6ec;
    --amber:#c2790a; --amber-bg:#fbf0d9;
    --red:#dc2626; --red-bg:#fceaea;
    --slate:#64748b; --slate-bg:#eef1f4;
    --shadow:0 1px 2px rgba(16,18,28,.04), 0 2px 6px rgba(16,18,28,.05);
    --radius:14px;
    --v0:#6366f1; --v1:#ec4899; --v2:#14b8a6; --v3:#f59e0b; --v4:#8b5cf6; --v5:#06b6d4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding:28px 22px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
        display:grid;place-items:center;box-shadow:var(--shadow);flex:none}
  .logo::before{content:"";width:13px;height:13px;border-radius:4px;background:#fff;
        clip-path:polygon(20% 12%,20% 88%,86% 50%)} /* play glyph */
  .brand h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .brand p{font-size:12.5px;color:var(--muted);margin-top:1px}
  .live{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);
        background:var(--surface);border:1px solid var(--border);padding:7px 12px;border-radius:999px;box-shadow:var(--shadow)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(22,163,74,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.45)}70%{box-shadow:0 0 0 6px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}

  /* Stat cards */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:22px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
        padding:16px 18px;box-shadow:var(--shadow)}
  .card .label{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:6px}
  .card .value{font-size:30px;font-weight:750;letter-spacing:-.02em;margin-top:7px;line-height:1}
  .card .value small{font-size:13px;font-weight:500;color:var(--muted);margin-left:6px}
  .card.accent .value{color:var(--accent)}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:4px;gap:2px;box-shadow:var(--shadow)}
  .seg button{border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:600;
        padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s;font-family:inherit}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(99,102,241,.35)}
  .hint{font-size:12px;color:var(--faint)}

  /* Table */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
        text-align:left;padding:13px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--surface-2)}

  /* Video cell */
  .vid{display:flex;align-items:center;gap:11px;min-width:210px}
  .thumb{width:62px;height:35px;border-radius:7px;object-fit:cover;background:var(--slate-bg);flex:none;border:1px solid var(--border)}
  .vid .meta{min-width:0}
  .vid .ch{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
  .vid .id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;color:var(--faint);text-decoration:none}
  .vid .id:hover{color:var(--accent)}
  .sdot{width:7px;height:7px;border-radius:50%;flex:none}
  .sdot.on{background:var(--green)} .sdot.off{background:var(--faint)}

  /* Variants */
  .variants{min-width:320px;max-width:440px}
  .v-row{margin:5px 0}
  .v-row:first-child{margin-top:0} .v-row:last-child{margin-bottom:0}
  .v-top{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;margin-bottom:3px}
  .v-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .v-pct{font-variant-numeric:tabular-nums;font-weight:650;color:var(--muted);flex:none}
  .v-track{height:6px;border-radius:999px;background:#eef0f3;overflow:hidden}
  .v-fill{height:100%;border-radius:999px}
  .v-more{font-size:11.5px;color:var(--faint);margin-top:4px}
  .v-none{color:var(--faint);font-size:13px}
  .v-none b{color:var(--muted);font-weight:600}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
        padding:4px 9px;border-radius:999px;white-space:nowrap}
  .badge .bd{width:6px;height:6px;border-radius:50%}
  .b-green{background:var(--green-bg);color:var(--green)} .b-green .bd{background:var(--green)}
  .b-amber{background:var(--amber-bg);color:var(--amber)} .b-amber .bd{background:var(--amber)}
  .b-red{background:var(--red-bg);color:var(--red)} .b-red .bd{background:var(--red)}
  .b-slate{background:var(--slate-bg);color:var(--slate)} .b-slate .bd{background:var(--slate)}
  .cmt{display:flex;align-items:center;gap:9px}
  .cmt a{font-size:12px;color:var(--accent);text-decoration:none;font-weight:600}
  .cmt a:hover{text-decoration:underline}
  .num{font-variant-numeric:tabular-nums;font-weight:600}
  .eng{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap}
  .eng b{font-weight:650;color:var(--muted)}
  .eng.on b{color:var(--ink)}
  .eng.like.on{color:#e0245e} .eng.reply.on{color:var(--accent)}
  .when{color:var(--muted);white-space:nowrap}
  .dash{color:var(--faint)}

  /* Expandable rows + history timeline */
  tr.rowmain{cursor:pointer}
  .chev{display:inline-block;color:var(--faint);font-size:10px;margin-right:2px;transition:transform .15s;flex:none}
  tr.rowmain.expanded .chev{transform:rotate(90deg);color:var(--accent)}
  tr.detail td{background:var(--surface-2);padding:0;border-bottom:1px solid var(--border)}
  .tl-wrap{padding:16px 18px 18px}
  .tl-cap{font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:500}
  .tl-chart{display:flex;align-items:flex-end;gap:6px;overflow-x:auto;padding-bottom:2px}
  .tl-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none}
  .tl-bar{width:30px;height:88px;border-radius:5px;overflow:hidden;display:flex;flex-direction:column;background:#eceef2}
  .tl-seg{width:100%}
  .tl-day{font-size:10px;color:var(--faint);white-space:nowrap}
  .tl-legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:14px}
  .tl-key{display:flex;align-items:center;gap:7px;font-size:12px;max-width:300px}
  .tl-key i{width:10px;height:10px;border-radius:3px;flex:none}
  .tl-kt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-key b{color:var(--muted);font-weight:650;flex:none;font-variant-numeric:tabular-nums}
  .tl-empty{padding:16px 18px;color:var(--faint);font-size:13px}
  .empty,.loading{text-align:center;padding:54px 20px;color:var(--muted)}
  .spin{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;
        animation:rot .7s linear infinite;margin:0 auto 12px}
  @keyframes rot{to{transform:rotate(360deg)}}
  footer{text-align:center;color:var(--faint);font-size:12px;margin-top:22px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Youtube Title Tracker</h1>
        <p>Catching YouTube's A/B title experiments in the wild</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="/admin" style="font-size:12.5px;color:var(--muted);text-decoration:none">Manage channels →</a>
      <div class="live"><span class="dot"></span><span id="updated">Live</span></div>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="seg" id="filters">
      <button data-f="active" class="on">Active</button>
      <button data-f="tested">Being tested</button>
      <button data-f="inactive">Inactive</button>
      <button data-f="all">All</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="panel">
    <div class="scroll">
      <table>
        <thead>
          <tr>
            <th>Video</th>
            <th>Title variants <span id="splitlbl"></span></th>
            <th>Comment</th>
            <th>Likes</th>
            <th>Replies</th>
            <th>Samples</th>
            <th>Published</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div id="state" class="loading"><div class="spin"></div>Loading…</div>
  </div>

  <footer>Refreshes automatically every 30s · samples taken continuously across rotating viewers</footer>
</div>

<script>
const VC = ['var(--v0)','var(--v1)','var(--v2)','var(--v3)','var(--v4)','var(--v5)'];
let all = [], filter = 'active', windowDays = 3;
const expanded = new Set();      // video_ids with the history timeline open
const timelineCache = {};        // video_id -> timeline rows

async function load(){
  try{
    const [s,v] = await Promise.all([fetch('/api/stats'),fetch('/api/videos')]);
    if(!s.ok||!v.ok) throw 0;
    const stats = await s.json(), vids = await v.json();
    all = vids.videos || [];
    windowDays = stats.ratio_window_days || 3;
    document.getElementById('splitlbl').textContent = `· split over last ${windowDays}d`;
    renderStats(stats);
    render();
    stamp();
    document.getElementById('state').style.display='none';
  }catch(e){
    document.getElementById('state').innerHTML = 'Could not load data — retrying…';
  }
}

function renderStats(s){
  const cards = [
    {label:'🎯 Active', value:s.active_videos||0, accent:false},
    {label:'🔬 Being tested', value:s.multi_title||0, accent:true, sub:'2+ titles'},
    {label:'💬 Comments', value:s.with_comments||0, accent:false},
    {label:'📊 Total tracked', value:s.total_in_db||0, accent:false},
  ];
  document.getElementById('stats').innerHTML = cards.map(c=>`
    <div class="card ${c.accent?'accent':''}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}${c.sub?`<small>${c.sub}</small>`:''}</div>
    </div>`).join('');
}

function statusBadge(v){
  if(!v.comment_id){
    const pending = (v.unique_titles||0) >= 2;
    return `<span class="badge b-slate"><span class="bd"></span>${pending?'Posting…':'—'}</span>`;
  }
  const map = {
    published:['b-green','Live'], unknown:['b-green','Live'],
    heldForReview:['b-amber','Held for review'],
    likelySpam:['b-red','Flagged'], rejected:['b-slate','Rejected']
  };
  const [cls,label] = map[v.comment_status] || ['b-green','Live'];
  const url = `https://youtube.com/watch?v=${v.video_id}&lc=${v.comment_id}`;
  return `<div class="cmt"><span class="badge ${cls}"><span class="bd"></span>${label}</span>
          <a href="${url}" target="_blank" rel="noopener">View</a></div>`;
}

function variantsCell(v){
  const vs = (v.variants||[]);
  if(vs.length <= 1){
    const only = vs[0] ? esc(vs[0].title) : '—';
    return `<div class="v-none">${vs.length?`<b>${trunc(only,60)}</b> · no test detected yet`:'—'}</div>`;
  }
  const useRecent = vs.some(x => (x.recent||0) > 0);
  const val = x => useRecent ? (x.recent||0) : (x.count||0);
  const ranked = [...vs].sort((a,b)=>val(b)-val(a));
  const total = ranked.reduce((s,x)=>s+val(x),0) || 1;
  const top = ranked.slice(0,4);
  let html = top.map((x,i)=>{
    const pct = Math.max(1, Math.round(100*val(x)/total));
    return `<div class="v-row">
      <div class="v-top"><span class="v-title" title="${esc(x.title)}">${esc(x.title)}</span><span class="v-pct">${pct}%</span></div>
      <div class="v-track"><div class="v-fill" style="width:${pct}%;background:${VC[i%VC.length]}"></div></div>
    </div>`;
  }).join('');
  if(ranked.length>top.length) html += `<div class="v-more">+${ranked.length-top.length} more variant${ranked.length-top.length>1?'s':''}</div>`;
  return html;
}

function render(){
  document.querySelectorAll('#filters button').forEach(b=>b.classList.toggle('on',b.dataset.f===filter));
  let list = all;
  if(filter==='active') list = all.filter(v=>v.is_active);
  else if(filter==='inactive') list = all.filter(v=>!v.is_active);
  else if(filter==='tested') list = all.filter(v=>(v.unique_titles||0)>=2);

  document.getElementById('hint').textContent = `${list.length} video${list.length!==1?'s':''}`;

  if(!list.length){
    document.getElementById('rows').innerHTML = '';
    const st = document.getElementById('state');
    st.style.display='block'; st.className='empty';
    st.textContent = filter==='tested' ? 'No active title experiments detected yet — they show up as videos accrue samples.' : 'Nothing here yet.';
    return;
  }
  document.getElementById('state').style.display='none';

  document.getElementById('rows').innerHTML = list.map(v=>{
    const url = `https://youtube.com/watch?v=${v.video_id}`;
    const thumb = `https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg`;
    return `<tr class="rowmain" data-id="${v.video_id}">
      <td><div class="vid">
        <span class="chev">▶</span>
        <img class="thumb" loading="lazy" src="${thumb}" onerror="this.style.visibility='hidden'">
        <div class="meta">
          <div class="ch"><span class="sdot ${v.is_active?'on':'off'}" title="${v.is_active?'Active':'Inactive'}"></span>${esc(v.channel_name||'')}</div>
          <a class="id" href="${url}" target="_blank" rel="noopener">${v.video_id}</a>
        </div>
      </div></td>
      <td class="variants">${variantsCell(v)}</td>
      <td>${statusBadge(v)}</td>
      <td>${engage(v,'like')}</td>
      <td>${engage(v,'reply')}</td>
      <td><span class="num">${v.total_samples||0}</span></td>
      <td class="when">${fmt(v.published_at)}</td>
    </tr>`;
  }).join('');

  // Re-open any timelines that were expanded before this refresh.
  expanded.forEach(id=>{
    const row = document.querySelector('#rows tr.rowmain[data-id="'+id+'"]');
    if(row) openDetail(row, id); else expanded.delete(id);
  });
}

function renderTimeline(video, timeline){
  if(!timeline || !timeline.length) return '<div class="tl-empty">No samples recorded yet.</div>';
  const order = (video.variants||[]).map(x=>x.title);
  const colorOf = t => { let i = order.indexOf(t); if(i<0){ i = order.length; order.push(t); } return VC[i%VC.length]; };
  const byDay = {};
  timeline.forEach(r=>{ (byDay[r.day]=byDay[r.day]||{})[r.title]=(byDay[r.day][r.title]||0)+r.count; });
  const days = Object.keys(byDay).sort();
  const titles = []; order.forEach(t=>{ if(timeline.some(r=>r.title===t)) titles.push(t); });
  timeline.forEach(r=>{ if(!titles.includes(r.title)) titles.push(r.title); });

  const cols = days.map(day=>{
    const m = byDay[day], tot = Object.values(m).reduce((a,b)=>a+b,0)||1;
    const segs = titles.filter(t=>m[t]).map(t=>
      `<div class="tl-seg" style="height:${100*m[t]/tot}%;background:${colorOf(t)}" title="${esc(t)} — ${Math.round(100*m[t]/tot)}%"></div>`).join('');
    const lbl = new Date(day).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    return `<div class="tl-col"><div class="tl-bar">${segs}</div><div class="tl-day">${lbl}</div></div>`;
  }).join('');

  const last = byDay[days[days.length-1]]||{}, lastTot = Object.values(last).reduce((a,b)=>a+b,0)||1;
  const legend = titles.map(t=>{
    const pct = last[t] ? Math.round(100*last[t]/lastTot) : 0;
    return `<div class="tl-key"><i style="background:${colorOf(t)}"></i><span class="tl-kt" title="${esc(t)}">${esc(t)}</span><b>${pct}%</b></div>`;
  }).join('');

  return `<div class="tl-wrap">
    <div class="tl-cap">Daily share of each title — how YouTube shifted the experiment (legend % = latest day)</div>
    <div class="tl-chart">${cols}</div>
    <div class="tl-legend">${legend}</div>
  </div>`;
}

function openDetail(row, id){
  if(row.nextElementSibling && row.nextElementSibling.classList.contains('detail')) return;
  row.classList.add('expanded');
  const tr = document.createElement('tr');
  tr.className = 'detail';
  tr.innerHTML = '<td colspan="7"><div class="tl-empty">Loading history…</div></td>';
  row.after(tr);
  const video = all.find(v=>v.video_id===id) || {};
  const draw = tl => { tr.firstElementChild.innerHTML = renderTimeline(video, tl); };
  if(timelineCache[id]) draw(timelineCache[id]);
  else fetch('/api/video/'+encodeURIComponent(id)).then(r=>r.json()).then(d=>{
        timelineCache[id] = d.timeline || []; draw(timelineCache[id]);
      }).catch(()=>{ tr.firstElementChild.innerHTML = '<div class="tl-empty">Could not load history.</div>'; });
}
function closeDetail(row){
  const n = row.nextElementSibling;
  if(n && n.classList.contains('detail')) n.remove();
  row.classList.remove('expanded');
}
document.getElementById('rows').addEventListener('click', e=>{
  if(e.target.closest('a')) return;            // let links work
  const row = e.target.closest('tr.rowmain');
  if(!row) return;
  const id = row.dataset.id;
  if(expanded.has(id)){ expanded.delete(id); closeDetail(row); }
  else { expanded.add(id); openDetail(row, id); }
});

function engage(v, kind){
  if(!v.comment_id) return '<span class="dash">—</span>';
  const n = kind==='like' ? (v.comment_like_count||0) : (v.comment_reply_count||0);
  const icon = kind==='like' ? '♥' : '↳';
  const cls = 'eng '+kind+(n>0?' on':'');
  return `<span class="${cls}">${icon}<b>${n}</b></span>`;
}
function fmt(d){ if(!d) return '<span class="dash">—</span>';
  return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function stamp(){ document.getElementById('updated').textContent = 'Updated '+new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function trunc(s,n){ return s.length>n ? s.slice(0,n-1)+'…' : s; }

document.getElementById('filters').addEventListener('click',e=>{
  if(e.target.dataset.f){ filter=e.target.dataset.f; render(); }
});
load();
setInterval(load, 30000);
</script>
</body>
</html>
